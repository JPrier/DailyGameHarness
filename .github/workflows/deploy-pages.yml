name: deploy-pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DAILY_GAME_BASE_PATH: /DailyGameHarness
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo run -p daily_game_tools -- prepare-static-build
      - run: cd web && npm ci && npm run typecheck && npm run test && npm run build
      - run: cargo run -p daily_game_tools -- check-static-output --dist web/dist
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
